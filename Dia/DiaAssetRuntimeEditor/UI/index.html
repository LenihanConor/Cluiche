<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Asset Runtime Editor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1e1e1e;
      color: #d4d4d4;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 10px;
      background: #2d2d2d;
      border-bottom: 1px solid #3c3c3c;
      flex-shrink: 0;
    }
    .toolbar .status { font-size: 11px; }
    .toolbar .status .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
    .toolbar .status .dot.connected { background: #4ec9a0; }
    .toolbar .status .dot.disconnected { background: #f48771; }

    .disconnect-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(30, 30, 30, 0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      flex-direction: column;
      gap: 8px;
    }
    .disconnect-overlay .message {
      font-size: 14px;
      color: #f48771;
    }
    .disconnect-overlay .hint {
      font-size: 11px;
      color: #888;
    }

    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 1px solid #3c3c3c;
    }
    .panel:last-child { border-right: none; }

    .panel-header {
      padding: 5px 10px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #9cdcfe;
      background: #252526;
      border-bottom: 1px solid #3c3c3c;
      flex-shrink: 0;
    }

    .panel-body {
      flex: 1;
      overflow: hidden;
    }
    .panel-body iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    #panel-left { width: 220px; min-width: 180px; }
    #panel-center { flex: 1; display: flex; flex-direction: column; }
    #panel-right { width: 280px; min-width: 220px; display: flex; flex-direction: column; }

    .center-top { flex: 1; display: flex; flex-direction: column; border-bottom: 1px solid #3c3c3c; overflow: hidden; }
    .center-bottom { height: 240px; min-height: 120px; display: flex; flex-direction: column; overflow: hidden; }
  </style>
</head>
<body>

<div class="toolbar">
  <div class="status">
    <span class="dot disconnected" id="status-dot"></span>
    <span id="status-text">Not connected to game</span>
  </div>
</div>

<div class="disconnect-overlay" id="disconnect-overlay">
  <div class="message">No game connected</div>
  <div class="hint">Use the Game Connection panel to connect to a running game</div>
</div>

<div class="layout">
  <div class="panel" id="panel-left">
    <div class="panel-header">Stage / Asset Tree</div>
    <div class="panel-body">
      <iframe src="stage-asset-tree.html" id="frame-tree"></iframe>
    </div>
  </div>

  <div class="panel" id="panel-center">
    <div class="center-top">
      <div class="panel-header">Asset State Table</div>
      <div class="panel-body">
        <iframe src="asset-state-table.html" id="frame-table"></iframe>
      </div>
    </div>
    <div class="center-bottom">
      <div class="panel-header">State Transition Log</div>
      <div class="panel-body">
        <iframe src="state-transition-log.html" id="frame-log"></iframe>
      </div>
    </div>
  </div>

  <div class="panel" id="panel-right">
    <div class="panel-header">Ref Count Inspector</div>
    <div class="panel-body">
      <iframe src="ref-count-inspector.html" id="frame-inspector"></iframe>
    </div>
  </div>
</div>

<script>
  var connected = false;

  function updateConnectionUI(isConnected) {
    connected = isConnected;
    var dot = document.getElementById('status-dot');
    var text = document.getElementById('status-text');
    var overlay = document.getElementById('disconnect-overlay');

    if (isConnected) {
      dot.className = 'dot connected';
      text.textContent = 'Connected';
      overlay.style.display = 'none';
    } else {
      dot.className = 'dot disconnected';
      text.textContent = 'Not connected to game';
      overlay.style.display = 'flex';
    }
  }

  // Listen for push notifications from the main frame (via postMessage).
  window.addEventListener('message', function(e) {
    var msg = e.data || {};
    if (!msg.__dia) return;

    if (msg.topic === 'asset_runtime_editor.connection_state') {
      updateConnectionUI(msg.data.connected);
    }

    // Forward to child iframes (sub-panels).
    var frames = ['frame-table', 'frame-tree', 'frame-inspector', 'frame-log'];
    frames.forEach(function(id) {
      var iframe = document.getElementById(id);
      if (iframe && iframe.contentWindow) {
        try { iframe.contentWindow.postMessage(msg, '*'); } catch(ex) {}
      }
    });
  });

  // Also support direct calls from the bridge (for backwards compatibility).
  window.DiaEditor_onDataChanged = function(msg) {
    if (msg.topic === 'asset_runtime_editor.connection_state') {
      updateConnectionUI(msg.data.connected);
    }

    var frames = ['frame-table', 'frame-tree', 'frame-inspector', 'frame-log'];
    frames.forEach(function(id) {
      var iframe = document.getElementById(id);
      if (iframe && iframe.contentWindow && iframe.contentWindow.DiaEditor_onDataChanged) {
        iframe.contentWindow.DiaEditor_onDataChanged(msg);
      }
    });
  };

  // Request initial connection state from the C++ backend via the parent frame.
  (function() {
    var reqId = 'arte-init-' + Date.now();

    // Listen for the response routed back via postMessage.
    function onResponse(e) {
      var msg = e.data;
      if (!msg || !msg.__diaResponse || msg.reqId !== reqId) return;
      window.removeEventListener('message', onResponse);
      if (msg.result && msg.result.connected !== undefined) {
        updateConnectionUI(msg.result.connected);
      }
    }
    window.addEventListener('message', onResponse);

    // Send the request through the parent frame's bridge.
    if (window.parent && window.parent !== window) {
      window.parent.postMessage({
        __diaFromFrame: true,
        payload: {
          type: 'asset_runtime_editor.get_connection_state',
          reqId: reqId,
          data: {}
        }
      }, '*');
    }
  })();
</script>

</body>
</html>
