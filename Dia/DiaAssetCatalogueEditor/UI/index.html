<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Asset Catalogue Editor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1e1e1e;
      color: #d4d4d4;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: #2d2d2d;
      border-bottom: 1px solid #3c3c3c;
      flex-shrink: 0;
    }

    .toolbar button {
      background: #3c3c3c;
      color: #d4d4d4;
      border: 1px solid #555;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      border-radius: 3px;
    }
    .toolbar button:hover { background: #4c4c4c; }

    .toolbar .manifest-path {
      flex: 1;
      font-size: 11px;
      color: #9cdcfe;
      margin-left: 8px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .toolbar .dirty-indicator {
      color: #f48771;
      font-size: 14px;
      font-weight: bold;
      visibility: hidden;
    }
    .toolbar .dirty-indicator.dirty { visibility: visible; }

    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .panel {
      display: flex;
      flex-direction: column;
      border-right: 1px solid #3c3c3c;
      overflow: hidden;
    }

    .panel-title {
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #9cdcfe;
      background: #252526;
      border-bottom: 1px solid #3c3c3c;
      flex-shrink: 0;
    }

    .panel-body {
      flex: 1;
      overflow: auto;
      padding: 12px;
    }

    .placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #555;
      font-size: 12px;
      font-style: italic;
    }

    #panel-asset-list { width: 280px; min-width: 200px; }
    #panel-record-editor { flex: 1; }
    #panel-right { width: 320px; min-width: 240px; border-right: none; }

    .tabs {
      display: flex;
      background: #252526;
      border-bottom: 1px solid #3c3c3c;
      flex-shrink: 0;
    }
    .tab {
      padding: 6px 14px;
      font-size: 11px;
      cursor: pointer;
      color: #9d9d9d;
      border-right: 1px solid #3c3c3c;
    }
    .tab.active { color: #d4d4d4; border-bottom: 2px solid #007acc; }
    .tab:hover { color: #d4d4d4; }
  </style>
</head>
<body>

<div class="toolbar">
  <button onclick="onNew()">New</button>
  <button onclick="onOpen()">Open</button>
  <button onclick="onSave()">Save</button>
  <span class="manifest-path" id="manifest-path">No manifest loaded</span>
  <span class="dirty-indicator" id="dirty-indicator">*</span>
</div>

<div class="layout">

  <div class="panel" id="panel-asset-list">
    <div class="panel-title">Asset List</div>
    <div class="panel-body">
      <div class="placeholder">Load a manifest to see assets</div>
    </div>
  </div>

  <div class="panel" id="panel-record-editor">
    <div class="tabs">
      <div class="tab active" onclick="showTab('records')">Asset Records</div>
      <div class="tab" onclick="showTab('relationships')">Relationships</div>
      <div class="tab" onclick="showTab('discoverer')">File Discoverer</div>
    </div>
    <div class="panel-body">
      <div class="placeholder">Select an asset to edit</div>
    </div>
  </div>

  <div class="panel" id="panel-right">
    <div class="tabs">
      <div class="tab active" onclick="showRightTab('validation')">Validation</div>
      <div class="tab" onclick="showRightTab('rules')">Rules</div>
      <div class="tab" onclick="showRightTab('graph')">Graph</div>
    </div>
    <div class="panel-body">
      <div class="placeholder">Run validation to see results</div>
    </div>
  </div>

</div>

<script>
  function diaRequest(command, params) {
    return new Promise(function(resolve) {
      if (window.DiaEditor && window.DiaEditor.request) {
        window.DiaEditor.request(command, params).then(resolve).catch(function(e) {
          console.error(command, e);
          resolve({ success: false, error: String(e) });
        });
      } else {
        console.warn('DiaEditor not available');
        resolve({ success: false, error: 'DiaEditor not available' });
      }
    });
  }

  function setManifestPath(path) {
    var el = document.getElementById('manifest-path');
    if (el) el.textContent = path || 'No manifest loaded';
  }

  function setDirty(dirty) {
    var el = document.getElementById('dirty-indicator');
    if (el) {
      if (dirty) el.classList.add('dirty');
      else el.classList.remove('dirty');
    }
  }

  // C++ pushes state changes here
  window.DiaEditor_onDataChanged = function(msg) {
    if (msg.topic === 'assetcatalogue.state') {
      setManifestPath(msg.data.path);
      setDirty(msg.data.dirty);
    } else if (msg.topic === 'assetcatalogue.lastManifestPath') {
      // Offer re-open on startup
      if (msg.data.lastManifestPath) {
        var reopen = confirm('Re-open last manifest?\n' + msg.data.lastManifestPath);
        if (reopen) onOpen(msg.data.lastManifestPath);
      }
    }
  };

  function onNew() {
    diaRequest('asset_catalogue.new_manifest', {}).then(function(r) {
      if (!r.success) alert('Failed: ' + r.error);
    });
  }

  function onOpen(prefilledPath) {
    var path = prefilledPath || prompt('Manifest path (assets.catalogue.json):');
    if (!path) return;
    diaRequest('asset_catalogue.load_manifest', { path: path }).then(function(r) {
      if (!r.success) alert('Load failed: ' + r.error);
    });
  }

  function onSave() {
    diaRequest('asset_catalogue.save_manifest', {}).then(function(r) {
      if (!r.success) alert('Save failed: ' + r.error);
    });
  }

  function showTab(name) {
    console.log('Tab:', name);
  }

  function showRightTab(name) {
    console.log('Right tab:', name);
  }

  document.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
      e.preventDefault();
      onSave();
    }
  });
</script>

</body>
</html>
